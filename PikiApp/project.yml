name: PikiApp
options:
  bundleIdPrefix: com.piki
  deploymentTarget:
    macOS: "15.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true
  defaultConfig: Debug
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "15.0"

packages:
  swift-markdown:
    url: https://github.com/apple/swift-markdown
    from: "0.4.0"

targets:
  PikiApp:
    type: application
    platform: macOS
    sources:
      - path: PikiApp
        excludes:
          - "Preview Content"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.piki.app
        PRODUCT_NAME: Piki
        GENERATE_INFOPLIST_FILE: YES
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 0.1.0
        SWIFT_EMIT_LOC_STRINGS: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_PREVIEWS: YES
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGN_STYLE: Automatic
        INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.productivity"
        INFOPLIST_KEY_CFBundleDisplayName: Piki
        INFOPLIST_KEY_NSAppTransportSecurity_NSAllowsLocalNetworking: true
    dependencies:
      - package: swift-markdown
        product: Markdown
      - target: PikiRuntimeHost
    postBuildScripts:
      - name: Copy Runtime Host
        basedOnDependencyAnalysis: false
        outputFiles:
          - "$(TARGET_BUILD_DIR)/$(PRODUCT_NAME).app/Contents/MacOS/PikiRuntimeHost"
          - "$(TARGET_BUILD_DIR)/$(PRODUCT_NAME).app/Contents/MacOS/PikiRuntimeHost.stamp"
        script: |
          set -euo pipefail
          HOST_PRODUCT_PATH="${TARGET_BUILD_DIR}/${PRODUCT_NAME}.app/Contents/MacOS/PikiRuntimeHost"
          cp -f "${BUILT_PRODUCTS_DIR}/PikiRuntimeHost" "$HOST_PRODUCT_PATH"
          chmod +x "$HOST_PRODUCT_PATH"
          date > "${TARGET_BUILD_DIR}/${PRODUCT_NAME}.app/Contents/MacOS/PikiRuntimeHost.stamp"
          set -euo pipefail
          HOST_PRODUCT_PATH="${TARGET_BUILD_DIR}/${PRODUCT_NAME}.app/Contents/MacOS/PikiRuntimeHost"
          cp -f "${BUILT_PRODUCTS_DIR}/PikiRuntimeHost" "$HOST_PRODUCT_PATH"
          chmod +x "$HOST_PRODUCT_PATH"
  PikiRuntimeHost:
    type: tool
    platform: macOS
    sources:
      - path: PikiRuntimeHost
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.piki.runtime-host
        PRODUCT_NAME: PikiRuntimeHost
        GENERATE_INFOPLIST_FILE: YES
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 0.1.0
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGN_STYLE: Automatic
