name: PikiApp
options:
  bundleIdPrefix: com.piki
  deploymentTarget:
    macOS: "15.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true
  defaultConfig: Debug
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "15.0"

packages:
  swift-markdown:
    path: LocalPackages/swift-markdown

schemes:
  PikiApp:
    build:
      targets:
        PikiApp: all
    run:
      config: Debug
    archive:
      config: Release
    profile:
      config: Release
    analyze:
      config: Debug
  PikiApp Onboarding:
    build:
      targets:
        PikiApp: all
    run:
      config: Debug
      environmentVariables:
        PIKI_FORCE_ONBOARDING: "1"
    archive:
      config: Release
    profile:
      config: Release
    analyze:
      config: Debug

targets:
  PikiApp:
    type: application
    platform: macOS
    sources:
      - path: PikiApp
        excludes:
          - "Preview Content"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.piki.app
        PRODUCT_NAME: Piki
        GENERATE_INFOPLIST_FILE: YES
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 0.1.0
        SWIFT_EMIT_LOC_STRINGS: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_PREVIEWS: YES
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGN_STYLE: Automatic
        INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.productivity"
        INFOPLIST_KEY_CFBundleDisplayName: Piki
        INFOPLIST_KEY_NSAppTransportSecurity_NSAllowsLocalNetworking: true
      configs:
        Release:
          ARCHS: arm64
          ONLY_ACTIVE_ARCH: YES
    dependencies:
      - package: swift-markdown
        product: Markdown
    postBuildScripts:
      - name: Build Runtime Bundle
        basedOnDependencyAnalysis: false
        outputFiles:
          - "$(TARGET_BUILD_DIR)/$(PRODUCT_NAME).app/Contents/Resources/runtime-paths.json"
          - "$(TARGET_BUILD_DIR)/$(PRODUCT_NAME).app/Contents/Resources/runtime-build-state.json"
          - "$(TARGET_BUILD_DIR)/$(PRODUCT_NAME).app/Contents/Resources/PikiRuntime"
        script: |
          set -euo pipefail
          APP_RESOURCES="${TARGET_BUILD_DIR}/${PRODUCT_NAME}.app/Contents/Resources"
          python3 "${SRCROOT}/../scripts/build_runtime_bundle.py" --copy-to "$APP_RESOURCES"
